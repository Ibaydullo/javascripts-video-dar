<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>

    <div class="flex bg-gray-100">
        <div class="w-1/5 bg-gray-800 text-white p-4">
            <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>
            <a href="./index3.html">
            </a>
            <button
                class=" bg-blue-200 hover:bg-blue-700 text-blue-700 hover:text-white font-bold py-2 px-4 rounded-3xl cursor-pointer block w-full text-center">
                Products
            </button>
            <a href="./index.html">
                <button
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-3xl mt-4 cursor-pointer block w-full text-center     ">
                    Categories
                </button>
            </a>
            <a href="./index2.html">
                <button name="Car shop"
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-3xl mt-4 cursor-pointer block w-full text-center     ">
                Car Shop
            </button>
        </a>
        <a href="./index3.html">
            <button
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-3xl mt-4 cursor-pointer block w-full text-center     ">
                Orders
            </button>
        </a>
        </div>
        <div class="block w-full p-4">
            <div class="w-3/4 p-6 block w-full justify-between ">
                <div class="flex items-center mb-6">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin Avatar"
                        class="w-10 h-10 rounded-full mr-3">
                    <div class="">
                        <p class="text-sm font-bold">Admin Name</p>
                    </div>
                </div>
                <div class="flex w-full justify-between mb-6">
                    <h1 class="text-3xl font-bold mb-6">Products</h1>
                    <div class="mb-4">
                        <button id="addProductBtn"
                            class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                            Add Product
                        </button>
                    </div>
                </div>
            </div>
            <div class="flex justify-between mb-6 w-full gap-6 p-6">
                <div class="w-4/6">
                    <table class="min-w-full bg-white">
                        <thead>
                            <tr>
                                <th class="py-2 px-4 border-3 border-sky-500">ID</th>
                                <th class="py-2 px-4 border-3 border-sky-500">Name</th>
                                <th class="py-2 px-4 border-3 border-sky-500">Picture</th>
                                <th class="py-2 px-4 border-3 border-sky-500">Price</th>
                                <th class="py-2 px-4 border-3 border-sky-500">Description</th>
                                <th class="py-2 px-4 border-3 border-sky-500">Actions</th>

                            </tr>
                        </thead>

                        <tbody id="productTableBody">
                        </tbody>
                    </table>
                </div>
                <div class="w-2/6 h-full p-4 bg-gray-200 rounded">
                    <h2 class="text-xl font-bold mb-4">Add New Product</h2>
                    <form id="addProductForm" class="space-y-4">
                        <div>
                            <label for="productName" class="block text-sm font-bold mb-2">Product Name</label>
                            <input type="text" id="productName" name="productName"
                                class="w-full px-3 py-2 border rounded">
                        </div>
                        <div>
                            <label for="productDescription" class="block text-sm font-bold mb-2">Product
                                Description</label>
                            <input type="text" id="productDescription" name="productDescription"
                                class="w-full px-3 py-2 border rounded">
                        </div>

                        <div>
                            <label for="productPrice" class="block text-sm font-bold mb-2">Product Price</label>
                            <input type="number" id="productPrice" name="productPrice"
                                class="w-full px-3 py-2 border rounded">
                        </div>

                        <div class="flex gap-5">
                            <select id="productCategory" name="productCategory" class="w-full px-3 py-2 border rounded">

                            </select>
                            <button id="handeleSaveCofe"
                                class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded w-full">
                                Add Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        <script src="./app.js"></script>
</body>

</html>
