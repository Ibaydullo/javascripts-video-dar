<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Coffee Order</title>
</head>

<body>
    <header class="bg-[#FAFAFA] text-[#4B2995] p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <img src="./images/Logo.png" alt="Coffee Logo" class="">

            <nav class="flex items-center gap-3">
                <a href="./index3.html" class="flex items-center gap-3">
                    <button
                        class="cursor-pointer flex items-center gap-2 bg-[#EBE5F9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#D8C9F2] transition">
                        <i class="fas fa-map-marker-alt"></i>
                        <span class="text-sm font-semibold">Location</span>
                    </button>
                </a>
                <a href="./adminProducts.html">

                    <button name="admin"
                        class="cursor-pointer flex items-center gap-2 bg-[#EBE5F9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#D8C9F2] transition">
                        <i class="fas fa-user"></i>
                         <span class="text-sm font-semibold">Admin Panel</span>
                    </button>
                </a>
                <a href="./index2.html" name="shopping cart"
                    class="cursor-pointer relative flex items-center gap-2 bg-[#F1E9C9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#E8D9A1] transition">
                    <span id="span"
                        class="absolute -top-2 -right-2 bg-[#C47F17] text-white rounded-full h-5 w-5 flex items-center justify-center text-xs"></span>
                    <i class="fas fa-shopping-cart"></i>
                </a>
            </nav>
        </div>
    </header>
    <div class="bg-[#FAFAFA] p-4">
        <div class="max-w-6xl mx-auto flex flex-col lg:flex-row justify-between mt-15">
            <div class="lg:w-7/12">
                <h1 class="font-title text-4xl font-extrabold leading-tight text-gray-900 mt-10 pr-45">
                    Encontre o café perfeito para qualquer hora do dia
                </h1>
                <p class="text-[#403937] font-roboto mb-6 mt-8 pr-55">
                    Com o Coffee Delivery você recebe seu café onde estiver, a qualquer hora
                </p>
                <div class="grid grid-cols-1 mt-20 sm:grid-cols-2 gap-0">
                    <div class="flex items-center gap-4 p-4">
                        <div class="h-10 w-10 bg-[#C47F17] text-white rounded-full flex items-center justify-center">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <div class="items-center">
                            <p class="text-sm text-[#574F4D]">Compra simples e segura</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 p-4 ">
                        <div class="h-10 w-10 bg-[#4B2995] text-white rounded-full flex items-center justify-center">
                            <i class="fas fa-box"></i>
                        </div>
                        <div class="items-center">
                            <p class="text-sm text-[#574F4D]">Embalagem mantém o café intacto</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 p-4">
                        <div class="h-10 w-10 bg-[#DBAC2C] text-white rounded-full flex items-center justify-center">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="items-center">
                            <p class="text-sm text-[#574F4D]">Entrega rápida e rastreada</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 p-4">
                        <div class="h-10 w-10 bg-[#4BB543] text-white rounded-full flex items-center justify-center">
                            <i class="fas fa-coffee"></i>
                        </div>
                        <div class="items-center">
                            <p class="text-sm text-[#574F4D]">O café chega fresquinho até você</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="lg:w-5/12 mt-10 lg:mt-0">
                <img src="./images/asosiy.png" alt="Coffee Image" class="w-full">
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-12">

        </div>

        <section class="max-w-6xl mx-auto mt-16 pb-16">
            <h2 class="text-2xl font-bold text-gray-900 mb-28">Nossos cafés</h2>
            <div id="cofeDiv" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

            </div>
        </section>

        <script src="./index2.js"></script>
        <script src="./index.js"></script>
</body>

</html>
