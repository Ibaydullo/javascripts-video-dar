<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Pedido Confirmado</title>
</head>

<body class="min-h-screen bg-[#FAFAFA] text-[#272221] font-sans">
    <header class="bg-[#FAFAFA] text-[#4B2995] p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="./index.html" class="flex items-center gap-3">
                <img src="./images/Logo.png" alt="Coffee Logo" class="h-10">

            </a>

            <nav class="flex items-center gap-3">
                <a href="./index3.html" class="flex items-center gap-3">
                    <button
                        class="cursor-pointer flex items-center gap-2 bg-[#EBE5F9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#D8C9F2] transition">
                        <i class="fas fa-map-marker-alt"></i>
                        <span class="text-sm font-semibold">Location</span>
                    </button>
                </a>
                <a href="./adminProducts.html">

                    <button name="admin"
                        class="cursor-pointer flex items-center gap-2 bg-[#EBE5F9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#D8C9F2] transition">
                        <i class="fas fa-user"></i>
                         <span class="text-sm font-semibold">Admin Panel</span>
                    </button>
                </a>
                <a href="./index2.html" name="shopping cart"
                    class="cursor-pointer relative flex items-center gap-2 bg-[#F1E9C9] text-[#4B2995] py-2 px-4 rounded-lg hover:bg-[#E8D9A1] transition">
                    <span id="span"
                        class="absolute -top-2 -right-2 bg-[#C47F17] text-white rounded-full h-5 w-5 flex items-center justify-center text-xs">0</span>
                    <i class="fas fa-shopping-cart"></i>
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mt-14 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <!-- Left: Confirmation Text -->
            <div>
                <h1 class="text-4xl font-extrabold text-[#403937]">Uhu! Pedido confirmado</h1>
                <p class="mt-3 text-lg text-[#574F4D]">Agora é só aguardar que logo o café chegará até você</p>

                <div class="mt-10 p-1 rounded-[36px] bg-gradient-to-br from-[#DBAC2C] to-[#8047F8]">
                    <div id="location" class="bg-white rounded-[35px] p-10">
                        
                    </div>
                </div>

                
            </div>

            <!-- Right: Illustration -->
            <div class="flex justify-center lg:justify-end">
                <div class="relative w-full max-w-md">
                    <img src="./images/Illustration.png" alt="Delivery" class="w-full object-cover" />
                </div>
            </div>
        </div>
    </main>

    <script src="./index2.js"></script>
</body>

</html>
